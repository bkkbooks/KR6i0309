  - {type: variant, offset: 21724, length: 38, content: 「八者諸佛如來無有愛憎、憍慢貪惜及諸煩惱，然而如來常樂寂靜，讚歎少欲離諸諠鬧，是如來行。」, 聖: ''}
  - {type: variant, offset: 21769, length: 54, content: 「九者如來無有一法不知、不善通達，於一切處境智現前無有分別，然而如來見彼有情所作事業，隨彼意轉方便誘引令得出離，是如來行。」, 聖: ''}
