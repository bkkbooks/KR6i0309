  - {type: variant, offset: 21874, length: 66, content: 「十者如來若見一分有情得富盛時不生歡喜，見其衰損不起憂慼，然而如來見彼有情修習正行，無礙大慈自然救攝；若見有情修習邪行，無礙大悲自然救攝，是如來行。」, 聖: ''}
